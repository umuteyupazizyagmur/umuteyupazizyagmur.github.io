html,body{width:100%;height:100%;overflow:hidden;font-family:'Outfit',sans-serif;background:#080f18;color:#e8edf2;}
#bgc{position:fixed;inset:0;z-index:0;}
#vig{position:fixed;inset:0;z-index:1;background:radial-gradient(ellipse at 50% 50%,transparent 28%,rgba(0,0,0,.65) 100%);pointer-events:none;}
#world{position:fixed;inset:0;z-index:10;overflow:hidden;}
#wi{position:absolute;inset:0;will-change:transform,opacity;}
#wi svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:2;overflow:visible;}
.mn{position:absolute;transform:translate(-50%,-50%);user-select:none;will-change:transform,opacity;}
.cn{width:190px;height:190px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:5px;z-index:20;cursor:pointer;}
.cn .ico{font-size:38px;line-height:1;}
.cn .lbl{font-family:'Playfair Display',serif;font-size:15px;font-weight:900;color:#fff;letter-spacing:.3px;line-height:1.25;}
.cn .sub{font-size:10px;opacity:.5;letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.bn{border-radius:18px;padding:16px 18px;width:172px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:5px;z-index:15;cursor:pointer;transition:transform .32s cubic-bezier(.34,1.56,.64,1),box-shadow .25s;position:relative;}
.bn .ico{font-size:24px;line-height:1;}
.bn .lbl{font-size:13px;font-weight:800;letter-spacing:.15px;line-height:1.3;}
.bn .dsc{font-size:10px;opacity:.6;font-weight:400;line-height:1.35;}
.bn:hover{transform:translate(-50%,-50%) scale(1.12)!important;z-index:50;}
.ln{border-radius:14px;padding:14px 15px;width:152px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:4px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);box-shadow:0 4px 16px rgba(0,0,0,.3);backdrop-filter:blur(12px);cursor:pointer;z-index:15;transition:transform .28s,background .28s;}
.ln .ico{font-size:20px;}
.ln .lbl{font-size:12px;font-weight:800;}
.ln:hover{background:rgba(255,255,255,.13)!important;transform:translate(-50%,-50%) scale(1.08)!important;}
.ibdg{position:absolute;top:8px;right:10px;width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;opacity:.5;cursor:pointer;transition:opacity .2s,background .2s;z-index:30;}
.ibdg:hover{opacity:1;background:rgba(255,255,255,.28);}
.cc-eco{background:linear-gradient(145deg,#1e4a7a,#0d2545);border:3px solid rgba(100,181,246,.7);box-shadow:0 0 55px rgba(100,181,246,.3),inset 0 0 28px rgba(100,181,246,.06);animation:pEco 4s ease-in-out infinite;}
@keyframes pEco{0%,100%{box-shadow:0 0 55px rgba(100,181,246,.3),inset 0 0 28px rgba(100,181,246,.06);}50%{box-shadow:0 0 90px rgba(100,181,246,.55),inset 0 0 40px rgba(100,181,246,.1);}}
.cc-bio{background:linear-gradient(145deg,#1b4332,#0a2418);border:2px solid rgba(56,176,94,.6);color:#a8e6c1;box-shadow:0 6px 28px rgba(56,176,94,.2);}
.cc-bio.cn{border-width:3px;animation:pBio 4s ease-in-out infinite;}
@keyframes pBio{0%,100%{box-shadow:0 0 55px rgba(56,176,94,.3);}50%{box-shadow:0 0 88px rgba(56,176,94,.55);}}
.cc-abi{background:linear-gradient(145deg,#1a3060,#0d1e40);border:2px solid rgba(100,181,246,.6);color:#b3d9f7;box-shadow:0 6px 28px rgba(100,181,246,.2);}
.cc-abi.cn{border-width:3px;animation:pAbi 4s ease-in-out infinite;}
@keyframes pAbi{0%,100%{box-shadow:0 0 55px rgba(100,181,246,.3);}50%{box-shadow:0 0 88px rgba(100,181,246,.55);}}
.cc-pro{background:linear-gradient(145deg,#145214,#082808);border:2px solid rgba(80,200,80,.6);color:#90ee90;box-shadow:0 6px 28px rgba(80,200,80,.2);}
.cc-pro.cn{border-width:3px;animation:pPro 4s ease-in-out infinite;}
@keyframes pPro{0%,100%{box-shadow:0 0 55px rgba(80,200,80,.3);}50%{box-shadow:0 0 88px rgba(80,200,80,.55);}}
.cc-con{background:linear-gradient(145deg,#4a2f0a,#281604);border:2px solid rgba(255,160,60,.6);color:#ffc880;box-shadow:0 6px 28px rgba(255,160,60,.2);}
.cc-con.cn{border-width:3px;animation:pCon 4s ease-in-out infinite;}
@keyframes pCon{0%,100%{box-shadow:0 0 55px rgba(255,160,60,.3);}50%{box-shadow:0 0 88px rgba(255,160,60,.55);}}
.cc-dec{background:linear-gradient(145deg,#3a1040,#1a0520);border:2px solid rgba(200,100,240,.6);color:#e0a0ff;box-shadow:0 6px 28px rgba(200,100,240,.2);}
.cc-dec.cn{border-width:3px;animation:pDec 4s ease-in-out infinite;}
@keyframes pDec{0%,100%{box-shadow:0 0 55px rgba(200,100,240,.3);}50%{box-shadow:0 0 88px rgba(200,100,240,.55);}}
.cc-phy{background:linear-gradient(145deg,#1a3a5c,#0a2038);border:2px solid rgba(100,181,246,.6);color:#b3d9f7;box-shadow:0 6px 28px rgba(100,181,246,.2);}
.cc-phy.cn{border-width:3px;animation:pPhy 4s ease-in-out infinite;}
@keyframes pPhy{0%,100%{box-shadow:0 0 55px rgba(100,181,246,.3);}50%{box-shadow:0 0 88px rgba(100,181,246,.55);}}
.cc-che{background:linear-gradient(145deg,#2d1a3d,#160a22);border:2px solid rgba(190,100,255,.6);color:#d8a0ff;box-shadow:0 6px 28px rgba(190,100,255,.2);}
.cc-che.cn{border-width:3px;animation:pChe 4s ease-in-out infinite;}
@keyframes pChe{0%,100%{box-shadow:0 0 55px rgba(190,100,255,.3);}50%{box-shadow:0 0 88px rgba(190,100,255,.55);}}
.cc-ino{background:linear-gradient(145deg,#0d3349,#051825);border:2px solid rgba(40,200,255,.6);color:#80dcff;box-shadow:0 6px 28px rgba(40,200,255,.2);}
.cc-ino.cn{border-width:3px;animation:pIno 4s ease-in-out infinite;}
@keyframes pIno{0%,100%{box-shadow:0 0 55px rgba(40,200,255,.3);}50%{box-shadow:0 0 88px rgba(40,200,255,.55);}}
.cc-org{background:linear-gradient(145deg,#3a2d0a,#1e1804);border:2px solid rgba(255,210,60,.6);color:#ffe080;box-shadow:0 6px 28px rgba(255,210,60,.2);}
.cc-org.cn{border-width:3px;animation:pOrg 4s ease-in-out infinite;}
@keyframes pOrg{0%,100%{box-shadow:0 0 55px rgba(255,210,60,.3);}50%{box-shadow:0 0 88px rgba(255,210,60,.55);}}
#bc{position:fixed;top:22px;left:50%;transform:translateX(-50%);z-index:200;display:flex;align-items:center;gap:5px;background:rgba(0,0,0,.55);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.1);border-radius:50px;padding:9px 22px;font-size:13px;font-weight:600;letter-spacing:.4px;white-space:nowrap;max-width:92vw;overflow:hidden;transition:transform .45s cubic-bezier(.34,1.56,.64,1),opacity .35s;}
.bci{cursor:pointer;color:rgba(255,255,255,.4);transition:color .25s;}
.bci:hover{color:#fff;}
.bci.act{color:#fff;cursor:default;pointer-events:none;}
.bcs{color:rgba(255,255,255,.2);}
#bbtn{position:fixed;bottom:28px;right:28px;z-index:200;background:rgba(0,0,0,.55);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.1);border-radius:50px;padding:12px 26px;color:#fff;font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .4s cubic-bezier(.34,1.56,.64,1);opacity:0;transform:translateY(18px) scale(.87);pointer-events:none;}
#bbtn.vis{opacity:1;transform:translateY(0) scale(1);pointer-events:all;}
#bbtn:hover{background:rgba(255,255,255,.17);transform:translateY(-3px) scale(1.04);}
#bbtn:hover .bba{transform:translateX(-5px);}
.bba{display:inline-block;transition:transform .28s;}
#hint{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);font-size:11px;opacity:.35;letter-spacing:1.5px;z-index:200;transition:opacity .7s;pointer-events:none;text-transform:uppercase;}
@keyframes rip{from{transform:scale(0);opacity:.4}to{transform:scale(5.5);opacity:0}}
#mol{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.65);backdrop-filter:blur(16px);opacity:0;pointer-events:none;transition:opacity .28s ease;}
#mol.open{opacity:1;pointer-events:all;}
#mbox{background:linear-gradient(155deg,#0f1e38 0%,#080f1c 100%);border:1px solid rgba(255,255,255,.15);border-radius:28px;max-width:520px;width:92vw;max-height:88vh;overflow-y:auto;box-shadow:0 40px 100px rgba(0,0,0,.85);transform:scale(.82) translateY(32px);transition:transform .4s cubic-bezier(.34,1.56,.64,1);}
#mol.open #mbox{transform:scale(1) translateY(0);}
#m-img-wrap{width:100%;height:200px;overflow:hidden;position:relative;flex-shrink:0;}
#m-img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s ease;}
#m-img:hover{transform:scale(1.04);}
#m-img-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,#0f1e38 100%);}
#m-img-placeholder{width:100%;height:100%;display:none;align-items:center;justify-content:center;font-size:72px;background:rgba(255,255,255,.03);}
#m-content{padding:28px 36px 32px;}
#m-ico{font-size:44px;text-align:center;margin-bottom:12px;line-height:1;}
#m-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;color:#fff;text-align:center;margin-bottom:5px;}
#m-sub{font-size:11px;opacity:.4;letter-spacing:2.5px;text-transform:uppercase;text-align:center;margin-bottom:20px;}
#m-desc{font-size:15px;line-height:1.85;color:rgba(210,230,255,.88);text-align:center;padding:0 4px;}
#m-items{margin-top:20px;display:flex;flex-direction:column;gap:10px;}
.mi{display:flex;align-items:flex-start;gap:14px;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.09);border-radius:15px;padding:14px 16px;text-align:left;}
.mi-ico{font-size:24px;flex-shrink:0;margin-top:1px;}
.mi-body{display:flex;flex-direction:column;gap:4px;}
.mi-lbl{font-size:13px;font-weight:800;color:#fff;}
.mi-desc{font-size:12px;line-height:1.65;color:rgba(190,215,255,.65);}
#m-close{display:block;margin:24px auto 0;padding:12px 40px;border-radius:50px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07);color:#fff;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:background .22s,transform .2s;}
#m-close:hover{background:rgba(255,255,255,.17);transform:scale(1.06);}
</style>
</head>
<body>

<div id="world"><div id="wi"><svg></svg></div></div>
<div id="mol" onclick="if(event.target===this)MODAL.close()">
  <div id="mbox">
    <div id="m-img-wrap">
      <img id="m-img" src="" alt="" />
      <div id="m-img-placeholder"></div>
      <div id="m-img-overlay"></div>
    </div>
    <div id="m-content">
      <div id="m-ico"></div>
      <div id="m-title"></div>
      <div id="m-sub"></div>
      <div id="m-desc"></div>
      <div id="m-items"></div>
      <button id="m-close" onclick="MODAL.close()">Kapat ✕</button>
    </div>
  </div>
</div>

const TREE={id:'eco',lbl:'EKOSİSTEM',sub:'UNSURLAR',ico:'🌿',cc:'cc-eco',theme:'eco',img:'eco',

children:[
{id:'bio',lbl:'CANLI FAKTÖRLER',dsc:'Biyotik Unsurlar',ico:'🦋',cc:'cc-bio',theme:'biotic',angle:210,img:'bio',
desc:'Biyotik faktörler; bir ekosistemde yaşayan tüm canlıları kapsar. Bitkiler, hayvanlar, mantarlar, bakteriler ve diğer mikroorganizmalar bu gruba girer. Canlılar birbirleriyle beslenme, rekabet, simbiyoz ve parazitlik gibi çeşitli ilişkiler kurarak ekosistemi şekillendirir.',

{lbl:'SİYANOBAKTERİ',ico:'🔬',img:'siyanobakteri',desc:'Prokaryot yapılı olmalarına karşın fotosentez yapabilen ilk canlılardandır. Yaklaşık 3,5 milyar yıl önce ortaya çıkarak atmosfere oksijen salmaya başlamışlar ve Dünya\'nın bugünkü atmosferinin oluşmasında kritik rol oynamışlardır. Azot fiksasyonu yaparak toprağı zenginleştirirler.'},
{lbl:'OTLAR',ico:'☘️',img:'otlar',desc:'Kara ekosistemlerinde zemin örtüsü oluşturarak toprak erozyonunu önler, nemi tutarlar. Otçul hayvanların temel besin kaynağıdırlar. Çayır ve bozkır ekosistemlerinin baskın üreticileridir. Hızlı büyüme ve çoğalma kapasiteleri sayesinde otlanma baskısına karşı dirençlidirler.'}
]},

const MODAL={
  open(node){
    const imgKey = node.img || 'eco';
    const img = document.getElementById('m-img');
    const ph = document.getElementById('m-img-placeholder');
    ph.textContent = node.ico || '🌿';
    img.style.display = 'block';
    ph.style.display = 'none';
    img.onload = null;
    img.onerror = function(){
      this.style.display='none';
      ph.style.display='flex';
    };
    img.src = IMAGES[imgKey] || IMAGES.eco;
    document.getElementById('m-ico').textContent=node.ico||'';
    document.getElementById('m-title').textContent=node.lbl||'';
    document.getElementById('m-sub').textContent=node.dsc||node.sub||'';
    document.getElementById('m-desc').textContent=node.desc||'';
    const box=document.getElementById('m-items');box.innerHTML='';
    const list=node.leaves||node.children||[];
    list.forEach(item=>{
      const d=document.createElement('div');d.className='mi';
      d.innerHTML='<div class="mi-ico">'+item.ico+'</div><div class="mi-body"><div class="mi-lbl">'+item.lbl+'</div><div class="mi-desc">'+(item.desc||item.dsc||'')+'</div></div>';
      box.appendChild(d);
    });
    document.getElementById('mol').classList.add('open');
    document.getElementById('mbox').scrollTop=0;
  },
  close(){document.getElementById('mol').classList.remove('open');}
};

const bgCv=document.getElementById('bgc'),bgCtx=bgCv.getContext('2d');
let BW,BH,bgPts=[];let bgCur={...TH.eco},bgTgt={...TH.eco},bgT=1;
function bgResize(){BW=bgCv.width=innerWidth;BH=bgCv.height=innerHeight;}
bgResize();addEventListener('resize',bgResize);
function bgSpawn(t){bgPts=Array.from({length:t.n},()=>({x:Math.random()*BW,y:Math.random()*BH,vx:(Math.random()-.5)*.48,vy:(Math.random()-.5)*.48,r:Math.random()*2.3+.8,a:Math.random()*.42+.08,ph:Math.random()*Math.PI*2}));}
bgSpawn(bgCur);
function lp(a,b,t){return a+(b-a)*t;}
function lhex(h1,h2,t){const p=c=>[parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)];const[a,b,c]=p(h1),[d,e,f]=p(h2);return'rgb('+~~lp(a,d,t)+','+~~lp(b,e,t)+','+~~lp(c,f,t)+')';}
(function bgLoop(){const t=Math.min(bgT,1);const g=bgCtx.createRadialGradient(BW/2,BH/2,0,BW/2,BH/2,Math.max(BW,BH)*.82);g.addColorStop(0,lhex(bgCur.c2,bgTgt.c2,t));g.addColorStop(1,lhex(bgCur.c1,bgTgt.c1,t));bgCtx.fillStyle=g;bgCtx.fillRect(0,0,BW,BH);bgCtx.fillStyle='rgba(255,255,255,.018)';for(let x=0;x<BW;x+=60)for(let y=0;y<BH;y+=60){bgCtx.beginPath();bgCtx.arc(x,y,1,0,Math.PI*2);bgCtx.fill();}const[r1,g1,b1]=bgCur.p,[r2,g2,b2]=bgTgt.p;const pr=~~lp(r1,r2,t),pg=~~lp(g1,g2,t),pb=~~lp(b1,b2,t);bgPts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.ph+=.016;if(p.x<0)p.x=BW;if(p.x>BW)p.x=0;if(p.y<0)p.y=BH;if(p.y>BH)p.y=0;const a=p.a*(.55+Math.sin(p.ph)*.45);bgCtx.beginPath();bgCtx.arc(p.x,p.y,p.r*(0.82+Math.sin(p.ph)*.18),0,Math.PI*2);bgCtx.fillStyle='rgba('+pr+','+pg+','+pb+','+a+')';bgCtx.fill();bgCtx.beginPath();bgCtx.arc(p.x,p.y,p.r*4,0,Math.PI*2);bgCtx.fillStyle='rgba('+pr+','+pg+','+pb+','+(a*.05)+')';bgCtx.fill();});bgT+=.011;if(bgT>=1){bgCur={...bgTgt};bgT=1;}requestAnimationFrame(bgLoop);})();
function setTheme(k){const t=TH[k]||TH.eco;bgTgt={...t};bgT=0;bgSpawn(t);}

const R_BRANCH=255,R_LEAF=220;
const toRad=d=>d*Math.PI/180;
const LINE_C={'cc-eco':'rgba(100,181,246,.5)','cc-bio':'rgba(56,176,94,.55)','cc-abi':'rgba(100,181,246,.55)','cc-pro':'rgba(80,200,80,.55)','cc-con':'rgba(255,160,60,.55)','cc-dec':'rgba(200,100,240,.55)','cc-phy':'rgba(100,181,246,.55)','cc-che':'rgba(190,100,255,.55)','cc-ino':'rgba(40,200,255,.55)','cc-org':'rgba(255,210,60,.55)'};
const LEAF_C={'cc-bio':{b:'rgba(56,176,94,.3)',t:'#a8e6c1'},'cc-abi':{b:'rgba(100,181,246,.3)',t:'#b3d9f7'},'cc-pro':{b:'rgba(80,200,80,.3)',t:'#90ee90'},'cc-con':{b:'rgba(255,160,60,.3)',t:'#ffc880'},'cc-dec':{b:'rgba(200,100,240,.3)',t:'#e0a0ff'},'cc-phy':{b:'rgba(100,181,246,.3)',t:'#b3d9f7'},'cc-che':{b:'rgba(190,100,255,.3)',t:'#d8a0ff'},'cc-ino':{b:'rgba(40,200,255,.3)',t:'#80dcff'},'cc-org':{b:'rgba(255,210,60,.3)',t:'#ffe080'}};

const wi=document.getElementById('wi');
let reg={};
function polar(cx,cy,r,deg){return{x:cx+r*Math.cos(toRad(deg)),y:cy+r*Math.sin(toRad(deg))};}
function clearScene(){wi.innerHTML='<svg></svg>';reg={};}
function addLine(id,x1,y1,x2,y2,col){const svg=wi.querySelector('svg');const line=document.createElementNS('http://www.w3.org/2000/svg','line');line.setAttribute('x1',x1);line.setAttribute('y1',y1);line.setAttribute('x2',x2);line.setAttribute('y2',y2);line.setAttribute('stroke',col);line.setAttribute('stroke-width','2');line.setAttribute('stroke-linecap','round');const len=Math.hypot(x2-x1,y2-y1);line.setAttribute('stroke-dasharray',len+10);line.setAttribute('stroke-dashoffset',len+10);line.style.transition='stroke-dashoffset .65s cubic-bezier(.4,0,.2,1)';svg.appendChild(line);requestAnimationFrame(()=>requestAnimationFrame(()=>line.setAttribute('stroke-dashoffset','0')));}
function mkNode(id,lbl,sub,ico,cc,type,x,y,onClick){const el=document.createElement('div');el.id='nd_'+id;el.className='mn '+type+' '+cc;el.style.left=x+'px';el.style.top=y+'px';el.style.opacity='0';el.style.transform='translate(-50%,-50%) scale(0.1)';if(type==='cn'){el.innerHTML='<div class="ico">'+ico+'</div><div class="lbl">'+lbl+'</div><div class="sub">'+(sub||'')+'</div>';}else if(type==='bn'){el.innerHTML='<div class="ico">'+ico+'</div><div class="lbl">'+lbl+'</div>'+(sub?'<div class="dsc">'+sub+'</div>':'');}else{el.innerHTML='<div class="ico">'+ico+'</div><div class="lbl">'+lbl+'</div>';}if(onClick)el.addEventListener('click',onClick);wi.appendChild(el);reg[id]={el,x,y};return el;}
function addBadge(nodeId,nodeData){setTimeout(()=>{const el=document.getElementById('nd_'+nodeId);if(!el||!nodeData.desc)return;const b=document.createElement('div');b.className='ibdg';b.textContent='i';b.addEventListener('mouseenter',()=>{b.style.opacity='1';b.style.background='rgba(255,255,255,.28)';});b.addEventListener('mouseleave',()=>{b.style.opacity='.5';b.style.background='rgba(255,255,255,.15)';});b.addEventListener('click',(e)=>{e.stopPropagation();MODAL.open(nodeData);});el.appendChild(b);},400);}
function animIn(){Object.values(reg).forEach(({el},i)=>{const isCtr=el.classList.contains('cn');setTimeout(()=>{el.style.transition='opacity .45s ease, transform .58s cubic-bezier(.34,1.56,.64,1)';el.style.opacity='1';el.style.transform='translate(-50%,-50%) scale(1)';},isCtr?0:i*55+80);});}
function distributeAngles(count,startAngle){const start=startAngle!==undefined?startAngle:-90;if(count===0)return[];if(count===1)return[start];return Array.from({length:count},(_,i)=>start+(360/count)*i);}
function buildMain(node,hasParent){const cx=innerWidth/2,cy=innerHeight/2;clearScene();const sub=hasParent?'↩ Geri Dön':(node.sub||'');const cel=mkNode(node.id,node.lbl,sub,node.ico,node.cc,'cn',cx,cy,hasParent?()=>NAV.back():()=>MODAL.open(node));cel.style.cursor='pointer';if(!hasParent)addBadge(node.id,node);const kids=node.children||[];const allHaveAngles=kids.length>0&&kids.every(k=>k.angle!==undefined);const angles=allHaveAngles?kids.map(k=>k.angle):distributeAngles(kids.length,-90);kids.forEach((k,i)=>{const ang=angles[i];const{x,y}=polar(cx,cy,R_BRANCH,ang);addLine(k.id,cx,cy,x,y,LINE_C[k.cc]||'rgba(255,255,255,.25)');const hasKids=(k.children&&k.children.length>0)||(k.leaves&&k.leaves.length>0);mkNode(k.id,k.lbl,k.dsc,k.ico,k.cc,'bn',x,y,(evt)=>{if(hasKids){ripFx(evt,reg[k.id].el);NAV.goTo(k);}else MODAL.open(k);});addBadge(k.id,k);});animIn();}
function buildLeaves(node){const cx=innerWidth/2,cy=innerHeight/2;clearScene();const cel=mkNode(node.id,node.lbl,'↩ Geri Dön',node.ico,node.cc,'cn',cx,cy,()=>NAV.back());cel.style.cursor='pointer';addBadge(node.id,node);const lc=LEAF_C[node.cc]||{b:'rgba(255,255,255,.2)',t:'#e8edf2'};const items=node.leaves||[];const angles=distributeAngles(items.length,-90);items.forEach((lf,i)=>{const ang=angles[i];const{x,y}=polar(cx,cy,R_LEAF,ang);addLine('lf_'+i,cx,cy,x,y,LINE_C[node.cc]||'rgba(255,255,255,.25)');const el=mkNode('lf_'+node.id+'_'+i,lf.lbl,null,lf.ico,'','ln',x,y,lf.desc?(e)=>{e.stopPropagation();MODAL.open(lf);}:null);el.style.borderColor=lc.b;el.style.color=lc.t;if(lf.desc)el.style.cursor='pointer';});animIn();}
const NAV=(()=>{const stack=[];let busy=false;function zoomInto(nodeId,cb){const entry=reg[nodeId];if(!entry){cb();return;}const{x,y}=entry;wi.style.transition='none';wi.style.transformOrigin=x+'px '+y+'px';requestAnimationFrame(()=>{wi.style.transition='transform .55s cubic-bezier(.4,0,.1,1), opacity .25s ease .22s';wi.style.transform='scale(13)';wi.style.opacity='0';});setTimeout(cb,590);}function zoomOut(cb){wi.style.transition='none';wi.style.transformOrigin='50% 50%';wi.style.transform='scale(0.06)';wi.style.opacity='0';requestAnimationFrame(()=>requestAnimationFrame(()=>{wi.style.transition='transform .6s cubic-bezier(.34,1.56,.64,1), opacity .35s ease';wi.style.transform='scale(1)';wi.style.opacity='1';cb();}));}function reset(){wi.style.transition='none';wi.style.transform='scale(1)';wi.style.transformOrigin='50% 50%';wi.style.opacity='1';}function render(node){reset();if(node.leaves&&node.leaves.length>0)buildLeaves(node);else buildMain(node,stack.length>0);setTheme(node.theme||'eco');updateUI();}function goTo(node){if(busy)return;busy=true;zoomInto(node.id,()=>{stack.push(node);render(node);busy=false;});}function back(){if(busy||stack.length===0)return;busy=true;MODAL.close();stack.pop();const cur=stack.length>0?stack[stack.length-1]:TREE;zoomOut(()=>{render(cur);busy=false;});}function jumpTo(si){if(busy)return;busy=true;MODAL.close();stack.splice(si+1);const cur=stack.length>0?stack[stack.length-1]:TREE;zoomOut(()=>{render(cur);busy=false;});}function updateUI(){const bc=document.getElementById('bc');bc.innerHTML='';const path=[TREE,...stack];path.forEach((n,i)=>{if(i>0){const s=document.createElement('span');s.className='bcs';s.textContent=' › ';bc.appendChild(s);}const sp=document.createElement('span');const isL=i===path.length-1;sp.className='bci'+(isL?' act':'');sp.textContent=n.ico+' '+(n.lbl.length>15?n.lbl.slice(0,13)+'…':n.lbl);if(!isL){const ji=i-1;sp.onclick=()=>jumpTo(ji);}bc.appendChild(sp);});bc.style.transform='translateX(-50%) scale(.9)';bc.style.opacity='.4';setTimeout(()=>{bc.style.transform='translateX(-50%) scale(1)';bc.style.opacity='1';},30);const btn=document.getElementById('bbtn');if(stack.length>0)btn.classList.add('vis');else btn.classList.remove('vis');}render(TREE);return{goTo,back,jumpTo};})();
function ripFx(evt,el){const r=el.getBoundingClientRect(),sz=Math.max(r.width,r.height)*1.8;const d=document.createElement('div');d.style.cssText='position:absolute;border-radius:50%;width:'+sz+'px;height:'+sz+'px;left:'+(evt.clientX-r.left-sz/2)+'px;top:'+(evt.clientY-r.top-sz/2)+'px;background:rgba(255,255,255,.22);pointer-events:none;animation:rip .55s ease-out forwards;';el.style.overflow='hidden';el.appendChild(d);setTimeout(()=>d.remove(),560);}
document.addEventListener('click',()=>{const h=document.getElementById('hint');if(h){h.style.opacity='0';setTimeout(()=>h&&h.remove(),700);}},{once:true});
addEventListener('keydown',e=>{if(e.key==='Escape'){if(document.getElementById('mol').classList.contains('open'))MODAL.close();else NAV.back();}});
</script>
</body>
