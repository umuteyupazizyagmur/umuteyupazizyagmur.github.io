<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ekosistem — Zihin Haritası</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#04060d;
  --blue:#60a5fa; --green:#34d399; --amber:#fbbf24;
  --purple:#c084fc; --red:#fb7185; --cyan:#22d3ee; --teal:#2dd4bf;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;
  font-family:'Outfit',sans-serif;color:#e2e8f0;-webkit-font-smoothing:antialiased;}

#panel-bg-img {
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background-size:cover; background-position:center;
  transition:opacity .6s ease, background-image .4s ease;
  opacity:0;
}
#panel-bg-img.show { opacity:1; }
#panel-bg-overlay {
  position:fixed; inset:0; z-index:1; pointer-events:none;
  background:linear-gradient(135deg,rgba(4,6,13,0.92) 0%,rgba(4,6,13,0.78) 50%,rgba(4,6,13,0.88) 100%);
  opacity:0; transition:opacity .6s;
}
#panel-bg-overlay.show { opacity:1; }

#bgc{position:fixed;inset:0;z-index:2;pointer-events:none;}

#vp{position:fixed;inset:0;z-index:3;overflow:hidden;}
#scene{position:absolute;top:0;left:0;transform-origin:0 0;}
#scene svg{position:absolute;inset:0;overflow:visible;pointer-events:none;}

.nd{
  position:absolute; border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:11px;cursor:pointer;
  transform:translate(-50%,-50%);
  transition:filter .2s, box-shadow .25s;
  backdrop-filter:blur(4px);
}
.nd:hover{filter:brightness(1.3);z-index:10;}

.s0{width:128px;height:128px;}
.s1{width:102px;height:102px;}
.s2{width:86px;height:86px;}
.s3{width:74px;height:74px;}
.s4{width:64px;height:64px;}
.s5{width:56px;height:56px;}

.blue  {background:radial-gradient(circle at 35% 30%,rgba(30,58,120,.85),rgba(7,12,30,.9));border:1.5px solid rgba(96,165,250,.55);box-shadow:0 0 28px rgba(96,165,250,.18),inset 0 1px 0 rgba(255,255,255,.08);}
.green {background:radial-gradient(circle at 35% 30%,rgba(6,60,37,.85),rgba(4,14,10,.9));border:1.5px solid rgba(52,211,153,.5);box-shadow:0 0 24px rgba(52,211,153,.15),inset 0 1px 0 rgba(255,255,255,.06);}
.amber {background:radial-gradient(circle at 35% 30%,rgba(60,40,5,.85),rgba(15,10,2,.9));border:1.5px solid rgba(251,191,36,.5);box-shadow:0 0 24px rgba(251,191,36,.15),inset 0 1px 0 rgba(255,255,255,.06);}
.purple{background:radial-gradient(circle at 35% 30%,rgba(50,20,80,.85),rgba(12,6,20,.9));border:1.5px solid rgba(192,132,252,.5);box-shadow:0 0 24px rgba(192,132,252,.15),inset 0 1px 0 rgba(255,255,255,.06);}
.red   {background:radial-gradient(circle at 35% 30%,rgba(60,10,20,.85),rgba(15,4,8,.9));border:1.5px solid rgba(251,113,133,.5);box-shadow:0 0 24px rgba(251,113,133,.15),inset 0 1px 0 rgba(255,255,255,.06);}
.cyan  {background:radial-gradient(circle at 35% 30%,rgba(5,45,60,.85),rgba(2,12,18,.9));border:1.5px solid rgba(34,211,238,.5);box-shadow:0 0 24px rgba(34,211,238,.15),inset 0 1px 0 rgba(255,255,255,.06);}
.teal  {background:radial-gradient(circle at 35% 30%,rgba(5,50,45,.85),rgba(2,14,12,.9));border:1.5px solid rgba(45,212,191,.5);box-shadow:0 0 24px rgba(45,212,191,.12),inset 0 1px 0 rgba(255,255,255,.06);}

.nd:hover.blue  {box-shadow:0 0 44px rgba(96,165,250,.4);}
.nd:hover.green {box-shadow:0 0 40px rgba(52,211,153,.35);}
.nd:hover.amber {box-shadow:0 0 40px rgba(251,191,36,.35);}
.nd:hover.purple{box-shadow:0 0 40px rgba(192,132,252,.35);}
.nd:hover.red   {box-shadow:0 0 40px rgba(251,113,133,.35);}
.nd:hover.cyan  {box-shadow:0 0 40px rgba(34,211,238,.35);}
.nd:hover.teal  {box-shadow:0 0 40px rgba(45,212,191,.32);}

.nd-lbl{font-family:'Cormorant Garamond',serif;font-size:11px;font-weight:600;line-height:1.25;color:#f0f4ff;letter-spacing:.01em;}
.s0 .nd-lbl{font-size:13px;font-weight:700;}
.s1 .nd-lbl{font-size:11.5px;}
.nd-sub{font-size:7.5px;font-weight:400;color:rgba(226,232,240,.38);letter-spacing:.1em;text-transform:uppercase;margin-top:3px;}

.nd-i{
  position:absolute;top:5px;right:5px;
  width:14px;height:14px;border-radius:50%;
  border:1px solid rgba(255,255,255,.22);
  background:rgba(255,255,255,.06);
  font-style:italic;font-size:8.5px;font-family:'Cormorant Garamond',serif;
  color:rgba(255,255,255,.5);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:5;transition:all .15s;
}
.nd-i:hover{background:rgba(255,255,255,.18);color:#fff;border-color:rgba(255,255,255,.55);transform:scale(1.3);}

#bc{
  position:fixed;top:18px;left:50%;transform:translateX(-50%);
  z-index:100;display:flex;align-items:center;gap:3px;
  background:rgba(4,6,13,.82);border:1px solid rgba(255,255,255,.1);
  border-radius:100px;padding:7px 20px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  font-size:11.5px;font-weight:500;white-space:nowrap;max-width:88vw;overflow:hidden;
}
.bc-i{color:rgba(226,232,240,.38);cursor:pointer;padding:0 3px;transition:color .15s;}
.bc-i:hover{color:#e2e8f0;}
.bc-i.cur{color:#e2e8f0;cursor:default;}
.bc-s{color:rgba(226,232,240,.18);}

#back{
  position:fixed;bottom:22px;right:22px;z-index:100;
  background:rgba(4,6,13,.82);border:1px solid rgba(255,255,255,.1);
  border-radius:100px;padding:9px 22px;
  font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;
  color:rgba(226,232,240,.6);cursor:pointer;
  backdrop-filter:blur(20px);transition:all .2s;display:none;
}
#back:hover{color:#e2e8f0;border-color:rgba(255,255,255,.24);}
#back.on{display:block;}

#zm{position:fixed;bottom:22px;left:22px;z-index:100;display:flex;flex-direction:column;gap:6px;}
.zb{
  width:36px;height:36px;
  background:rgba(4,6,13,.82);border:1px solid rgba(255,255,255,.1);
  border-radius:10px;color:rgba(226,232,240,.55);font-size:17px;cursor:pointer;
  backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.zb:hover{color:#e2e8f0;border-color:rgba(255,255,255,.24);}

#panel{
  position:fixed;top:50%;right:28px;
  transform:translateY(-50%) translateX(calc(100% + 40px));
  width:400px;max-height:85vh;
  background:rgba(6,9,20,.94);
  border:1px solid rgba(255,255,255,.12);
  border-radius:24px;
  box-shadow:0 32px 96px rgba(0,0,0,.8),0 0 0 1px rgba(255,255,255,.04),inset 0 1px 0 rgba(255,255,255,.06);
  backdrop-filter:blur(36px);-webkit-backdrop-filter:blur(36px);
  z-index:200;
  transition:transform .42s cubic-bezier(.4,0,.2,1),opacity .42s;
  opacity:0;display:flex;flex-direction:column;overflow:hidden;
}
#panel.open{transform:translateY(-50%) translateX(0);opacity:1;}

#p-img{
  height:160px;flex-shrink:0;position:relative;overflow:hidden;
  border-radius:24px 24px 0 0;
}
#p-img-inner{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
  transition:transform 8s ease;
}
#panel.open #p-img-inner{transform:scale(1.06);}
#p-img-grad{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(6,9,20,.1) 0%,rgba(6,9,20,.7) 70%,rgba(6,9,20,.96) 100%);
}
#p-img-title{
  position:absolute;bottom:14px;left:22px;right:54px;
  font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;
  color:#f0f4ff;line-height:1.15;letter-spacing:.01em;
  text-shadow:0 2px 12px rgba(0,0,0,.6);
}
#p-img-sub{
  position:absolute;bottom:50px;left:22px;
  font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;
  color:rgba(255,255,255,.5);
}
#p-bar{
  position:absolute;top:0;left:0;right:0;height:3.5px;border-radius:24px 24px 0 0;
}

#p-x{
  position:absolute;top:14px;right:14px;
  width:30px;height:30px;border-radius:50%;z-index:10;
  background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.18);
  color:rgba(255,255,255,.7);font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
  backdrop-filter:blur(8px);
}
#p-x:hover{background:rgba(255,255,255,.15);color:#fff;}

#p-body{flex:1;overflow-y:auto;padding:18px 24px 28px;}
#p-body::-webkit-scrollbar{width:3px;}
#p-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px;}

#p-desc{
  font-size:14px;line-height:1.85;color:rgba(226,232,240,.8);
  margin-bottom:22px;padding-bottom:20px;
  border-bottom:1px solid rgba(255,255,255,.07);
}
#p-kids-lbl{
  font-size:9px;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(255,255,255,.26);margin-bottom:10px;
}
#p-kids{display:flex;flex-direction:column;gap:7px;}
.pk{
  padding:11px 14px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;cursor:pointer;transition:all .18s;
  display:flex;align-items:center;gap:11px;
}
.pk:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.17);transform:translateX(4px);}
.pk-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.pk-n{font-size:12.5px;font-weight:600;color:#e2e8f0;margin-bottom:2px;}
.pk-s{font-size:10.5px;color:rgba(226,232,240,.38);}

@keyframes ndfade{from{opacity:0;transform:translate(-50%,-50%) scale(.82)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
.ndfade{animation:ndfade .38s cubic-bezier(.34,1.3,.64,1) both;}

#hint{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
  font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(226,232,240,.18);pointer-events:none;z-index:50;transition:opacity .6s;}
</style>
</head>
<body>
<div id="panel-bg-img"></div>
<div id="panel-bg-overlay"></div>
<canvas id="bgc"></canvas>

<div id="bc"></div>
<button id="back" onclick="goBack()">← Geri</button>
<div id="zm">
  <button class="zb" onclick="doZ(1.35)">+</button>
  <button class="zb" onclick="doZ(0.74)">−</button>
  <button class="zb" onclick="resetV()" style="font-size:12px">⌂</button>
</div>

<div id="vp"><div id="scene"><svg id="sv"></svg></div></div>

<div id="panel">
  <div id="p-img">
    <div id="p-img-inner"></div>
    <div id="p-img-grad"></div>
    <div id="p-bar"></div>
    <button id="p-x" onclick="closeP()">✕</button>
    <div id="p-img-sub"></div>
    <div id="p-img-title"></div>
  </div>
  <div id="p-body">
    <div id="p-desc"></div>
    <div id="p-kids-lbl">Alt Kategoriler</div>
    <div id="p-kids"></div>
  </div>
</div>

<div id="hint">Düğüme tıkla · i = Açıklama</div>

<script>
/* ── RENKLER ── */
const C={blue:'#60a5fa',green:'#34d399',amber:'#fbbf24',purple:'#c084fc',red:'#fb7185',cyan:'#22d3ee',teal:'#2dd4bf'};

/* ── UNSPLASH GÖRSELLERİ ── */
const IMGS={
  eco:'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800&q=80',
  biyo:'https://images.unsplash.com/photo-1518020382113-a7e8fc38eac9?w=800&q=80',
  uret:'https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?w=800&q=80',
  foto:'https://images.unsplash.com/photo-1530968464165-7a1861cbaf9e?w=800&q=80',

  kamci:'https://images.unsplash.com/photo-1614850523459-c2f4c699c52e?w=800&q=80',

  bitki:'https://images.unsplash.com/photo-1444492417251-9c84a5fa18e0?w=800&q=80',

  kemo:'https://images.unsplash.com/photo-1628595351029-c2bf17511435?w=800&q=80',
  tuket:'https://images.unsplash.com/photo-1474511320723-9a56873867b5?w=800&q=80',

  ayrist:'https://images.unsplash.com/photo-1598965402089-897ce52e8355?w=800&q=80',
  cansiz:'https://images.unsplash.com/photo-1504701954957-2010ec3bcec1?w=800&q=80',
  fizik:'https://images.unsplash.com/photo-1504253163759-c23fccaebb55?w=800&q=80',
  kimya:'https://images.unsplash.com/photo-1532187863486-abf9dbad1b69?w=800&q=80',
  isik:'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80',
  ruzgar:'https://images.unsplash.com/photo-1527482797697-8795b05a13fe?w=800&q=80',
  yagis:'https://images.unsplash.com/photo-1501691223387-dd0500403074?w=800&q=80',
  sicak:'https://images.unsplash.com/photo-1504701954957-2010ec3bcec1?w=800&q=80',
  nem:'https://images.unsplash.com/photo-1516912481808-3406841bd33c?w=800&q=80',
  inorg:'https://images.unsplash.com/photo-1559827291-72ee739d0d9a?w=800&q=80',
  org2:'https://images.unsplash.com/photo-1576086213369-97a306d36557?w=800&q=80',
  default:'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800&q=80',
};

function getImg(id){return IMGS[id]||IMGS.default;}

/* ── VERİ ── */
/* FIX: Tüm desc/sub değerleri double-quote kullanıyor —
   Türkçe kesme işaretleri (Dünya'nın, %50'sini, NADPH'e vb.)
   single-quoted string içinde syntax hatası veriyordu. */
const TREE={id:'eco',label:'EKOSİSTEM',sub:'Unsurlar',color:'blue',
desc:"Ekosistem, canlı (biyotik) ve cansız (abiyotik) bileşenlerin karşılıklı etkileşimde bulunduğu, işlevsel bir bütün oluşturan doğal sistemdir. Bu sistemde enerji güneşten girer; üreticiler, tüketiciler ve ayrıştırıcılar aracılığıyla aktarılır; maddeler ise döngüsel biçimde yeniden kullanılır. Bir orman, bir göl, hatta bir damla toprak bile bütünüyle işleyen bir ekosistem sayılabilir.",
children:[
{id:'biyo',label:'CANLI UNSURLAR',sub:'Biyotik',color:'green',
desc:"Biyotik faktörler; bir ekosistemde yaşayan tüm canlıları kapsar. Bitkiler, hayvanlar, mantarlar, bakteriler ve protistalar bu gruba girer. Canlılar arasındaki beslenme, üreme ve rekabet ilişkileri ekosistemi şekillendirir. Biyotik faktörler olmadan madde döngüsü ve enerji akışı mümkün olmaz.",
children:[
{id:'uret',label:'ÜRETİCİLER',sub:'Ototrof',color:'green',
desc:"Üreticiler (ototrof organizmalar), inorganik maddelerden ve enerji kaynağından (güneş ışığı veya kimyasal enerji) organik besin sentezleyebilen canlılardır. Ekosistem besin zincirinin birinci halkasını oluştururlar ve olmadan hiçbir tüketici yaşayamaz. Kara ekosistemlerinde bitkiler, deniz ekosistemlerinde ise fitoplanktonlar baskın üretici grubudur.",
children:[
{id:'foto',label:'FOTOSENTEZ YAPANLAR',sub:'Işık enerjisi',color:'teal',
desc:"Fotosentez yapan organizmalar, güneş ışığının fotonlarını kloroplastlarındaki klorofil pigmentleriyle yakalar ve bu enerjiyi ATP ile NADPH'e dönüştürür. Karanlık reaksiyonlarda ise CO₂ moleküllerini glikoza bağlar. Dünya atmosferindeki oksijenin tamamına yakını bu süreçle üretilmiştir. Tepkime: 6CO₂ + 6H₂O + ışık enerjisi → C₆H₁₂O₆ + 6O₂",
children:[
{id:'okary',label:'ÖKARYOTLAR',sub:'Zarflı çekirdek',color:'teal',
desc:"Ökaryotlar; genetik materyallerini çift katlı zar ile çevrili bir çekirdekte barındıran organizmalardır. Mitokondri, endoplazmik retikulum ve Golgi aygıtı gibi organeller içerirler. Karmaşık hücre yapıları sayesinde çok hücreli ve büyük organizmaların evrimleşmesine olanak tanımışlardır. Bitkiler, hayvanlar, mantarlar ve protistalar ökaryotlara girer.",
children:[
{id:'prot',label:'PROTİSTALAR',sub:'Tek/çok hücreli',color:'teal',
desc:"Protistalar, hayvan, bitki ya da mantar olmayan ökaryot organizmalardır. Su ekosistemlerinin temel üreticileri olan fitoplanktonları barındırır. Okyanuslardaki toplam oksijen üretiminin yaklaşık %50'sini fitoplanktonlar sağlar. Aynı zamanda besin ağının kilit halkasıdır: zooplanktonlar ve balıklar için birincil besin kaynağıdır.",
children:[
{id:'kamci',label:'KAMÇILILAR',sub:'Flagellata',color:'teal',
desc:"Kamçılılar; bir ya da birden fazla kamçıyla (flagella) hareket eden tek hücreli ökaryotlardır. Euglena, hem kloroplastı sayesinde fotosentez yapabilir hem de organik madde tüketebilen miksotrofik yapısıyla dikkat çeker. Dinoflagellatlar ise tropikal denizlerde zaman zaman 'kızıl gel-git' denen toksik çiçeklenmeler oluşturur."},
{id:'alg',label:'ALGLER',sub:'Algae',color:'teal',
desc:"Algler; su ortamlarında yaşayan, klorofil taşıyan, basit yapılı fotosentetik organizmalardır. Tek hücreli Chlorella'dan 45 metre uzunluğa ulaşabilen Macrocystis (dev kelp) alglerine kadar büyük bir çeşitlilik gösterirler. Ticari açıdan biyoyakıt, ilaç, kozmetik ve gıda endüstrilerinde kullanılır."}
]},
{id:'bitki',label:'BİTKİLER',sub:'Plantae',color:'green',
desc:"Bitkiler; karasal ve su ekosistemlerinin en görünür üreticileridir. Dünya'nın kara yüzeyinin yaklaşık %80'ini kaplayan karasal biyokütlenin %82'sini bitkiler oluşturur. Selülozdan oluşan hücre duvarları, su taşıyan ksilem ve besin taşıyan floem dokuları, bitkinin kara yaşamına uyumunun temel yapılarıdır.",
children:[
{id:'tohumsuz',label:'TOHUMSUZLAR',sub:'Kryptogamae',color:'green',
desc:"Tohumsuz bitkiler; tohum oluşturmadan spor ya da vejetatif yolla üreyen, evrimsel açıdan daha ilkel bitki gruplarıdır. Ilıman ve tropikal ormanlarda toprak nemini düzenler, erozyon önler ve birincil suksesyonda öncü tür işlevi görürler. Paleozoyik Karbon döneminde devasa ormanlar oluşturarak günümüz kömür yataklarının büyük bölümünü meydana getirmişlerdir.",
children:[
{id:'damarsiz',label:'DAMARSIZ',sub:'Bryophyta',color:'green',

/* ── STATE ── */
let sx=0,sy=0,sc=1,stk=[],cur=TREE;
const scene=document.getElementById('scene'),svEl=document.getElementById('sv');

function setT(x,y,s,anim){
  sx=x;sy=y;sc=s;
  scene.style.transition=anim?'transform .45s cubic-bezier(.4,0,.2,1)':'none';
  scene.style.transform=`translate(${x}px,${y}px) scale(${s})`;
}

/* ── LAYOUT ── */
function calcLayout(node){
  node._x=0;node._y=0;node._lv=0;
  const kids=node.children||[];
  if(!kids.length)return;
  place(kids,0,0,0,1,[240,195,160,135,115]);
}
function place(kids,px,py,pa,lv,R){
  const n=kids.length,r=R[Math.min(lv-1,R.length-1)];
  const spread=Math.min(Math.PI*1.5,Math.max(0.7,n*0.48));
  kids.forEach((k,i)=>{
    const a=n===1?pa:n===2&&lv===1?(i===0?Math.PI:0):pa-spread/2+(spread/(n-1))*i;
    k._x=Math.round(px+Math.cos(a)*r);
    k._y=Math.round(py+Math.sin(a)*r);
    k._lv=lv;k._a=a;
    if(k.children&&k.children.length)place(k.children,k._x,k._y,a,lv+1,R);
  });
}

/* ── GATHER ── */
function gather(node,max,out=[]){
  out.push(node);
  if(node._lv<max&&node.children)node.children.forEach(c=>gather(c,max,out));
  return out;
}

/* ── RENDER ── */
function render(node,anim=true){
  cur=node;
  calcLayout(node);
  const vis=gather(node,2);
  svEl.innerHTML='';
  Array.from(scene.children).forEach(c=>{if(c!==svEl)c.remove();});

  vis.forEach(n=>{
    if(!n.children)return;
    n.children.forEach(c=>{
      if(c._lv===undefined||c._lv>2)return;
      const col=C[c.color]||C.blue;
      const sw=n._lv===0?2:n._lv===1?1.5:1;
      const mx=(n._x+c._x)/2,my=(n._y+c._y)/2;
      const dx=c._x-n._x,dy=c._y-n._y,len=Math.sqrt(dx*dx+dy*dy)||1;
      const cv=len*.05,cpx=mx-(dy/len)*cv,cpy=my+(dx/len)*cv;
      const p=document.createElementNS('http://www.w3.org/2000/svg','path');
      p.setAttribute('d',`M${n._x} ${n._y} Q${cpx} ${cpy} ${c._x} ${c._y}`);
      p.setAttribute('stroke',col);p.setAttribute('stroke-width',sw);
      p.setAttribute('fill','none');p.setAttribute('stroke-linecap','round');
      p.setAttribute('stroke-opacity',c._lv===2?'0.3':'0.45');
      if(c._lv===2)p.setAttribute('stroke-dasharray','3 5');
      svEl.appendChild(p);
    });
  });

  vis.forEach((n,i)=>{
    const szCls=['s0','s1','s2','s3','s4','s5'][Math.min(n._lv,5)];
    const el=document.createElement('div');
    el.className=`nd ${szCls} ${n.color||'blue'}`;
    if(anim){el.classList.add('ndfade');el.style.animationDelay=i*20+'ms';}
    el.style.left=n._x+'px';el.style.top=n._y+'px';
    el.innerHTML=`<div class="nd-lbl">${n.label}</div>${n.sub?`<div class="nd-sub">${n.sub}</div>`:''}${n.desc?`<div class="nd-i">i</div>`:''}`;
    el.addEventListener('click',()=>{
      if(n._lv===0)return;
      if(n.children&&n.children.length){stk.push(cur);render(n,true);updateUI();}
    });
    const badge=el.querySelector('.nd-i');
    if(badge)badge.addEventListener('click',e=>{e.stopPropagation();openP(n);});
    scene.appendChild(el);
  });

  fitView(vis,anim);
  updateUI();
}

/* ── FIT VIEW ── */
function fitView(nodes,anim){
  let mnx=1e9,mxx=-1e9,mny=1e9,mxy=-1e9;
  nodes.forEach(n=>{const r=68;mnx=Math.min(mnx,n._x-r);mxx=Math.max(mxx,n._x+r);mny=Math.min(mny,n._y-r);mxy=Math.max(mxy,n._y+r);});
  const W=innerWidth,H=innerHeight,mw=mxx-mnx,mh=mxy-mny;
  const s=Math.min(W/mw,(H-56)/mh,3.5)*.88;
  const cx=(mnx+mxx)/2,cy=(mny+mxy)/2;
  setT(W/2-cx*s,H/2-cy*s,s,anim);
}

/* ── ZOOM ── */
function doZ(f){
  const W=innerWidth/2,H=innerHeight/2;
  const ns=Math.max(.08,Math.min(6,sc*f));
  const rf=ns/sc;
  setT(W-rf*(W-sx),H-rf*(H-sy),ns,false);
}
function resetV(){stk=[];closeP();render(TREE,true);}

/* ── NAV ── */
function goBack(){if(!stk.length)return;render(stk.pop(),true);}
function updateUI(){
  const bc=document.getElementById('bc');
  bc.innerHTML='';
  const trail=[...stk,cur];
  trail.forEach((n,i)=>{
    const isL=i===trail.length-1;
    const s=document.createElement('span');
    s.className='bc-i'+(isL?' cur':'');
    s.textContent=n.label.length>13?n.label.slice(0,11)+'…':n.label;
    if(!isL)s.onclick=()=>{stk.splice(i);render(n,true);};
    bc.appendChild(s);
    if(!isL){const sep=document.createElement('span');sep.className='bc-s';sep.textContent='›';bc.appendChild(sep);}
  });
  document.getElementById('back').classList.toggle('on',stk.length>0);
}

/* ── PANEL ── */
function openP(n){
  const col=C[n.color]||C.blue;
  const img=getImg(n.id);

  document.getElementById('p-img-inner').style.backgroundImage=`url(${img})`;
  document.getElementById('p-bar').style.background=col;
  document.getElementById('p-img-sub').textContent=n.sub||'';
  document.getElementById('p-img-title').textContent=n.label;
  document.getElementById('p-desc').textContent=n.desc||'';

  document.getElementById('panel-bg-img').style.backgroundImage=`url(${img})`;
  document.getElementById('panel-bg-img').classList.add('show');
  document.getElementById('panel-bg-overlay').classList.add('show');

  const kids=document.getElementById('p-kids');
  kids.innerHTML='';
  const lbl=document.getElementById('p-kids-lbl');
  lbl.style.display=(n.children&&n.children.length)?'block':'none';
  (n.children||[]).forEach(c=>{
    const d=document.createElement('div');d.className='pk';
    d.innerHTML=`<div class="pk-dot" style="background:${C[c.color]||C.blue}"></div><div><div class="pk-n">${c.label}</div><div class="pk-s">${c.sub||''}</div></div>`;
    d.onclick=()=>{closeP();if(c.children&&c.children.length){stk.push(cur);render(c,true);}};
    kids.appendChild(d);
  });

  document.getElementById('panel').classList.add('open');
}
function closeP(){
  document.getElementById('panel').classList.remove('open');
  document.getElementById('panel-bg-img').classList.remove('show');
  document.getElementById('panel-bg-overlay').classList.remove('show');
}

/* ── BG CANVAS ── */
const bgc=document.getElementById('bgc'),bgx=bgc.getContext('2d');
let bw,bh,bpts=[];
function bgR(){bw=bgc.width=innerWidth;bh=bgc.height=innerHeight;}
bgR();addEventListener('resize',bgR);
for(let i=0;i<55;i++)bpts.push({x:Math.random()*1400,y:Math.random()*900,vx:(Math.random()-.5)*.12,vy:(Math.random()-.5)*.12,r:Math.random()*1.2+.3,ph:Math.random()*Math.PI*2,h:[215,195,255,175][i%4],a:Math.random()*.09+.02});
(function loop(){
  bgx.clearRect(0,0,bw,bh);
  const g=bgx.createRadialGradient(bw*.35,bh*.3,0,bw*.5,bh*.5,Math.max(bw,bh));
  g.addColorStop(0,'#080d1c');g.addColorStop(.5,'#060810');g.addColorStop(1,'#030508');
  bgx.fillStyle=g;bgx.fillRect(0,0,bw,bh);
  bgx.fillStyle='rgba(255,255,255,.006)';
  for(let x=0;x<bw;x+=54)for(let y=0;y<bh;y+=54){bgx.beginPath();bgx.arc(x,y,.6,0,Math.PI*2);bgx.fill();}
  bpts.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.ph+=.005;
    if(p.x<0)p.x=bw;if(p.x>bw)p.x=0;if(p.y<0)p.y=bh;if(p.y>bh)p.y=0;
    bgx.beginPath();bgx.arc(p.x,p.y,p.r,0,Math.PI*2);
    bgx.fillStyle=`hsla(${p.h},55%,65%,${p.a*(0.35+Math.sin(p.ph)*.65)})`;
    bgx.fill();
  });
  requestAnimationFrame(loop);
})();

/* ── KLAVYE ── */
addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(document.getElementById('panel').classList.contains('open'))closeP();
    else goBack();
  }
});
addEventListener('resize',()=>{fitView(gather(cur,2),false);});

/* ── BAŞLAT ── */
render(TREE,false);
setTimeout(()=>{const h=document.getElementById('hint');if(h){h.style.opacity='0';setTimeout(()=>h.remove(),700);}},4000);
</script>
